events {
    worker_connections 1024;
}

http {
    # Use Docker's embedded DNS and re-resolve every second so nginx picks up
    # container changes quickly instead of caching stale IPs indefinitely.
    resolver 127.0.0.11 valid=1s ipv6=off;

    server {
        listen 80;

        location / {
            # Using a variable forces nginx to re-resolve the hostname on each
            # request (respecting the resolver TTL above) rather than at startup.
            set $upstream service1:3000;
            proxy_pass http://$upstream;

            # On connection error or timeout, retry the next resolved IP
            # instead of immediately returning HTTP 000 to the client.
            proxy_connect_timeout 500ms;
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 2s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
